services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

  backend:
    build:
      context: ./api/project-f-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://projectf:${POSTGRES_PASSWORD}@postgres:5432/projectf?schema=public
      PORT: "4002"
      CORS_ORIGINS: ${CORS_ORIGINS}
      VROOM_URL: http://vroom:3000
      AWS_REGION: ap-southeast-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      SQS_OPTIMIZE_QUEUE_URL: ${SQS_OPTIMIZE_QUEUE_URL}
      # SQS_ENDPOINT intentionally absent → real AWS
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4002/docs"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./api/project-f-ui
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: projectf
      POSTGRES_USER: projectf
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projectf"]
      interval: 10s
      timeout: 5s
      retries: 5

  vroom:
    image: ghcr.io/vroom-project/vroom-docker:latest
    restart: unless-stopped
    environment:
      - VROOM_ROUTER=osrm
    volumes:
      - ./config/vroom/config.yml:/conf/config.yml:ro
    depends_on:
      - osrm

  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    restart: unless-stopped
    volumes:
      - ./data/osrm:/data
    command: osrm-routed --algorithm mld /data/map.osrm

volumes:
  pgdata:
