name: Deploy

on:
  push:
    branches:
      - main

jobs:
  # ── 1. Backend tests ───────────────────────────────────────────────────────
  test-backend:
    name: Backend — lint & unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/project-f-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/project-f-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  # ── 2. Frontend tests ──────────────────────────────────────────────────────
  test-frontend:
    name: Frontend — lint, unit tests & build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/project-f-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/project-f-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build check
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

  # ── 3. Provision infrastructure with Pulumi ───────────────────────────────
  provision:
    name: Pulumi — provision infra
    runs-on: ubuntu-latest
    needs: [test-backend]
    defaults:
      run:
        working-directory: api/project-f-backend/infra

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/project-f-backend/infra/package-lock.json

      - name: Install infra dependencies
        run: npm ci

      - name: Pulumi up
        uses: pulumi/actions@v5
        with:
          command: up
          stack-name: prod
          work-dir: api/project-f-backend/infra
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Export Pulumi outputs
        id: outputs
        run: |
          echo "EC2_IP=$(pulumi stack output instanceIp --stack prod)" >> "$GITHUB_OUTPUT"
          echo "SQS_URL=$(pulumi stack output sqsQueueUrl --stack prod)" >> "$GITHUB_OUTPUT"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

    outputs:
      ec2_ip: ${{ steps.outputs.outputs.EC2_IP }}
      sqs_url: ${{ steps.outputs.outputs.SQS_URL }}

  # ── 4. Deploy to EC2 via SSH (after infra + frontend tests pass) ───────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [provision, test-frontend]

    steps:
      - name: SSH — pull, build & migrate
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ needs.provision.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: POSTGRES_PASSWORD,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,SQS_OPTIMIZE_QUEUE_URL,VITE_MAPBOX_TOKEN,VITE_API_BASE_URL,CORS_ORIGINS
          script: |
            set -euo pipefail
            cd ~/app
            git pull origin main

            docker compose -f docker-compose.prod.yml up -d --build

            # Run migrations inside the running backend container
            docker compose -f docker-compose.prod.yml exec -T backend \
              npx prisma migrate deploy
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SQS_OPTIMIZE_QUEUE_URL: ${{ needs.provision.outputs.sqs_url }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
