name: Deploy

on:
  push:
    branches:
      - main

jobs:
  # ── 1. Backend tests ───────────────────────────────────────────────────────
  test-backend:
    name: Backend — lint & unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/project-f-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/project-f-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  # ── 2. Frontend tests ──────────────────────────────────────────────────────
  test-frontend:
    name: Frontend — lint, unit tests & build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api/project-f-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/project-f-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build check
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

  # ── 3. Database migrations (runs after backend tests pass) ─────────────────
  migrate:
    name: Run Prisma migrations
    runs-on: ubuntu-latest
    needs: [test-backend]
    defaults:
      run:
        working-directory: api/project-f-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/project-f-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ── 4. Deploy backend (after migrations) ───────────────────────────────────
  deploy-backend:
    name: Deploy backend to Railway
    runs-on: ubuntu-latest
    needs: [migrate]

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        run: railway up --service ${{ vars.RAILWAY_BACKEND_SERVICE_ID }} --detach
        working-directory: api/project-f-backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ── 5. Deploy frontend (after frontend tests pass) ─────────────────────────
  deploy-frontend:
    name: Deploy frontend to Railway
    runs-on: ubuntu-latest
    needs: [test-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy frontend
        run: railway up --service ${{ vars.RAILWAY_FRONTEND_SERVICE_ID }} --detach
        working-directory: api/project-f-ui
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
